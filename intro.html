<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TIFY</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@1,300;1,500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html { background: #05070a; }

body {
  background-color: #05070a;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  transition: opacity 1.8s ease;
}

/* ─── 밤하늘 배경 ─── */
.night-sky {
  position: fixed;
  inset: 0;
  z-index: 1;
  background:
    radial-gradient(ellipse at top right,   rgba(123, 92, 255, 0.18) 0%, transparent 50%),
    radial-gradient(ellipse at bottom left, rgba(232, 121, 249, 0.12) 0%, transparent 50%),
    radial-gradient(ellipse at bottom,      #1b2735 0%, #090a0f 100%);
}

/* ─── 깜빡이는 정적 별 ─── */
.star-static {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 4s ease-in-out infinite alternate;
}
@keyframes twinkle {
  0%, 100% { opacity: 0.15; }
  50%      { opacity: 1; }
}

/* ─── 별똥별 ─── */
.shooting-star {
  position: absolute;
  top: 0; left: 0;
  width: 2px; height: 2px;
  background: linear-gradient(-45deg, #ffffff, rgba(139, 92, 246, 0));
  filter: drop-shadow(0 0 6px #ffffff);
  border-radius: 999px;
  animation: tail 3s ease-in-out infinite, shooting 3s ease-in-out infinite;
  opacity: 0;
}
@keyframes tail {
  0%   { width: 0; }
  30%  { width: 100px; }
  100% { width: 0; }
}
@keyframes shooting {
  0%   { transform: translateX(0)    translateY(0)    rotate(45deg); opacity: 1; }
  100% { transform: translateX(800px) translateY(800px) rotate(45deg); opacity: 0; }
}

/* ─── TIFY 글자 ─── */
.intro-container {
  position: relative;
  z-index: 10;
  display: flex;
  gap: 25px;
  align-items: baseline;
}

.char {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(5rem, 12vw, 8rem);
  font-weight: 300;
  font-style: italic;
  color: white;
  opacity: 0;
  transform: translateY(15px);
  filter: blur(10px);
  transition: all 2s cubic-bezier(0.22, 1, 0.36, 1);
}
.char.active {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0px);
  text-shadow:
    0 0 30px rgba(139, 92, 246, 0.5),
    0 0 60px rgba(232, 121, 249, 0.3);
}

/* ─── 서브타이틀 ─── */
.subtitle {
  position: absolute;
  bottom: 22vh;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255, 255, 255, 0.5);
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  letter-spacing: 6px;
  text-transform: uppercase;
  opacity: 0;
  z-index: 10;
  transition: opacity 1.5s ease;
  white-space: nowrap;
}
.subtitle.active { opacity: 1; }

/* ─── 페이드 아웃 ─── */
body.fading { opacity: 0; }
</style>
</head>
<body>

<div class="night-sky" id="sky"></div>

<div class="intro-container">
  <span class="char">T</span>
  <span class="char">I</span>
  <span class="char">F</span>
  <span class="char">Y</span>
</div>

<div class="subtitle" id="subtitle">This Is For You</div>

<script>
  /* 인트로를 봤다는 플래그를 미리 설정 (홈 화면이 이걸 보고 인트로 스킵) */
  sessionStorage.setItem('tify_intro_shown', '1');

  const sky = document.getElementById('sky');

  /* 1. 정적 별 50개 뿌리기 */
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'star-static';
    const size = Math.random() * 2 + 1;
    s.style.width  = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top  = Math.random() * 100 + 'vh';
    s.style.animationDelay = (Math.random() * 4) + 's';
    sky.appendChild(s);
  }

  /* 2. 별똥별 생성 (원본 버그: 별 → star 로 수정) */
  function createShootingStar() {
    const star = document.createElement('div');
    star.className = 'shooting-star';
    star.style.left = Math.random() * 100 + 'vw';
    star.style.top  = Math.random() * 50  + 'vh';
    const duration = Math.random() * 2 + 3;
    star.style.animationDuration = duration + 's';
    sky.appendChild(star);
    setTimeout(() => star.remove(), duration * 1000);
  }
  setInterval(createShootingStar, 1500);
  createShootingStar(); // 시작과 동시에 1개

  /* 3. TIFY 글자 순차 등장 */
  const chars = document.querySelectorAll('.char');
  setTimeout(() => {
    chars.forEach((char, i) => {
      setTimeout(() => char.classList.add('active'), i * 450);
    });
  }, 500);

  /* 4. 서브타이틀 등장 */
  setTimeout(() => {
    document.getElementById('subtitle').classList.add('active');
  }, 2800);

  /* 5. 페이드 아웃 → 홈 화면 이동 */
  setTimeout(() => {
    document.body.classList.add('fading');
  }, 5500);

  setTimeout(() => {
    window.location.href = 'index.html';
  }, 7300); // fade(1.8초) 완료 후 이동
</script>

</body>
</html>
