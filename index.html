<!doctype html><html lang="ko"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<script>
  if (!sessionStorage.getItem('tify_intro_shown')) {
    window.location.replace('intro.html');
  }
</script>
<title>TIFY · 홈</title><link rel="stylesheet" href="css/style.css"/>
</head><body>
<div class="app">
  
<aside class="sidebar">
  <div class="logo">TIFY</div>
  <a href="index.html" class="nav-item active"><span class="ico">🏠</span><span>홈</span></a>
<a href="result.html" class="nav-item"><span class="ico">🎵</span><span>추천 플레이리스트</span></a>
<a href="record.html" class="nav-item"><span class="ico">💗</span><span>감정 기록</span></a>
<a href="saved.html" class="nav-item"><span class="ico">🔖</span><span>저장한 음악</span></a>

  <div class="weather-card" id="weatherCard">
    <div class="wh"><span class="icon" id="wIcon">🌤</span><span class="temp" id="wTemp">--°</span></div>
    <div class="desc" id="wDesc">날씨 불러오는 중...</div>
    <div class="loc" id="wLoc">📍 위치 확인 중</div>
  </div>
  <div class="quote">
    <span class="moon">🌙</span>
    "음악은 감정을<br/>이해하는 가장<br/>가까운 언어야."
  </div>
</aside>

  <main class="main">
    <section class="home">
      <div class="weather-banner" id="weatherBanner">
        <span class="ic">🌤</span><span id="bannerText">오늘의 날씨를 불러오는 중...</span>
      </div>
<!-- 변경 -->
<h1>오늘 기분에 딱 맞는 음악 <span class="serif-en">for you</span> 🎧<br>어떤 감정인지 알려주세요!</h1>      <p class="subtitle">지금 느끼는 감정을 적어주시면, AI가 당신을 위한 찰떡같은 노래 5곡을 선곡해 드립니다.</p>
      
      <form class="input-wrap" id="inputForm">
        <input id="moodInput" type="text" placeholder="예: 비가 와서 조금 우울한데 위로되는 노래 틀어줘 🎵" autocomplete="off"/>
        <button class="send-btn" type="submit" aria-label="전송">➤</button>
      </form>
      <p class="or-text">또는 감정을 선택해보세요</p>
      <div class="chips" id="chips">
        <button class="chip" data-mood="happy" data-label="행복해"><span class="emoji">😊</span>행복해</button>
        <button class="chip" data-mood="sad" data-label="우울해"><span class="emoji">😢</span>우울해</button>
        <button class="chip" data-mood="dawn" data-label="새벽감성"><span class="emoji">🌙</span>새벽감성</button>
        <button class="chip" data-mood="focus" data-label="집중하고 싶어"><span class="emoji">🎧</span>집중하고 싶어</button>
        <button class="chip" data-mood="chill" data-label="멍 때리고 싶어"><span class="emoji">☁️</span>멍 때리고 싶어</button>
        <button class="chip" data-mood="love" data-label="설레는 기분"><span class="emoji">💗</span>설레는 기분</button>
        <button class="chip" data-mood="angry" data-label="화가 나"><span class="emoji">😠</span>화가 나</button>
        <button class="chip" data-mood="anxious" data-label="불안해"><span class="emoji">😰</span>불안해</button>
        <button class="chip" data-mood="energetic" data-label="신나고 싶어"><span class="emoji">⚡</span>신나고 싶어</button>
        <button class="chip" data-mood="nostalgic" data-label="추억에 젖어"><span class="emoji">📷</span>추억에 젖어</button>
        <button class="chip" data-mood="lonely" data-label="외로워"><span class="emoji">🥀</span>외로워</button>
        <button class="chip" data-mood="rainy" data-label="비 오는 기분"><span class="emoji">🌧️</span>비 오는 기분</button>
      </div>
    </section>
  </main>
</div>
<script src="js/weather.js"></script>
<script src="js/chat.js"></script>
<script src="js/daily-lift.js"></script>
<script src="js/weather-widget.js"></script>   <!-- ✨ 추가 -->
<script src="js/share-card.js"></script>     <!-- ✨ 추가 -->

<script src="js/theme.js"></script>
    <script src="js/playlist.js"></script>
    <script src="js/starfield.js"></script>
<script src="js/recent.js"></script>
</body></html>
